<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — FIFA Event Game</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8eef8 50%, #dce6f5 100%);
      padding: 1rem;
    }

    /* Decorative blobs */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(230,57,70,0.08) 0%, transparent 70%);
      top: -120px; left: -120px;
      border-radius: 50%;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(69,123,157,0.1) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      border-radius: 50%;
      pointer-events: none;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 20px;
      padding: 2.75rem 2.5rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      position: relative;
      z-index: 1;
    }

    .login-header { text-align: center; margin-bottom: 2rem; }

    .login-header .icon-ring {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e63946, #f4a261);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.9rem;
      margin: 0 auto 1.1rem;
      box-shadow: 0 8px 20px rgba(230,57,70,0.3);
    }

    .login-header h2 { font-weight: 800; color: #1a1a2e; font-size: 1.75rem; }
    .login-header p  { color: #6c757d; margin-top: 0.3rem; font-size: 0.92rem; }

    .form-floating .form-control {
      border: 1.5px solid #cbd5e1;
      border-radius: 10px;
      height: 56px;
      transition: all 0.2s ease-in-out;
      font-size: 0.95rem;
      color: #0f172a !important; /* Dark text for typed input */
      font-weight: 600;
    }

    .form-floating .form-control:focus {
      border-color: #e63946;
      box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.12);
    }

    .form-floating label { 
      color: #334155 !important; /* High contrast dark text for resting label */
      font-size: 0.9rem; 
      font-weight: 600;
    }

    .form-floating .form-control:focus ~ label {
      color: #e63946 !important; /* Turns red when input is focused */
    }

    .btn-login {
      background: linear-gradient(135deg, #e63946, #c1121f);
      border: none;
      border-radius: 10px;
      height: 52px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #fff;
      width: 100%;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(230,57,70,0.4);
      color: #fff;
    }

    .btn-login:active { transform: translateY(0); }

    .alert-custom { border-radius: 10px; border: none; font-size: 0.88rem; }

    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.25rem; }
      .login-header h2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="icon-ring">🏆</div>
      <h2>FIFA Event Game</h2>
      <p>Sign in to continue</p>
    </div>

    <!-- Error alert -->
    {% if form.errors %}
    <div class="alert alert-danger alert-custom d-flex align-items-center gap-2 mb-3" role="alert">
      <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
      <span>Invalid username or password. Please try again.</span>
    </div>
    {% endif %}

    {% if messages %}
      {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-custom mb-3" role="alert">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <!-- Form -->
    <form method="POST" autocomplete="off">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}" />

      <div class="form-floating mb-3">
        <input
          type="text"
          class="form-control"
          id="id_username"
          name="username"
          placeholder="Username"
          autofocus
          required
        />
        <label for="id_username"><i class="bi bi-person me-1"></i>Username</label>
      </div>

      <div class="form-floating mb-4">
        <input
          type="password"
          class="form-control"
          id="id_password"
          name="password"
          placeholder="Password"
          required
        />
        <label for="id_password"><i class="bi bi-lock me-1"></i>Password</label>
      </div>

      <button type="submit" class="btn btn-login" id="loginBtn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <p class="text-center text-muted mt-4 mb-0" style="font-size:0.78rem;">
      &copy; 2026 FIFA Event Game &bull; All rights reserved
    </p>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelector('form').addEventListener('submit', function () {
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';
    });
  </script>
</body>
</html>
